services:
  - type: web
    name: habitar-cpu
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false   # paste the Neon connection string in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: REQUIRED_CREDITS
        value: "10"
      - key: APP_NAME
        value: "Módulo Habitar"
      - key: SESSION_HTTPS_ONLY
        value: "1"   # Render serves HTTPS; send the session cookie only over TLS
