{% extends "base.html" %}
{% block title %}Encuesta{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow p-6">
  <h1 class="text-xl font-bold mb-1">¿Qué te pareció?</h1>
  <p class="text-slate-500 text-sm mb-4">{{ a.titulo }}</p>
  {% if answered %}
    <div class="mb-4 rounded-lg bg-slate-100 px-4 py-2 text-sm text-slate-600">Ya respondiste (<i data-lucide="star" class="inline-block w-4 h-4 align-[-3px]"></i> {{ answered.rating }}). Podés actualizar tu respuesta.</div>
  {% endif %}
  <form method="post" action="/actividades/{{ a.id }}/encuesta" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-2">Tu valoración</label>
      <div class="flex gap-2" id="stars">
        {% for n in [1,2,3,4,5] %}
        <label class="cursor-pointer">
          <input type="radio" name="rating" value="{{ n }}" class="sr-only peer" {% if answered and answered.rating==n %}checked{% endif %} {% if n==5 and not answered %}checked{% endif %}>
          <i data-lucide="star" class="w-8 h-8 text-slate-300 peer-checked:text-amber-400 peer-checked:fill-amber-400"></i>
        </label>
        {% endfor %}
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Comentario (opcional)</label>
      <textarea name="comment" rows="3" class="w-full border rounded-lg px-3 py-2">{{ answered.comment if answered and answered.comment else '' }}</textarea>
    </div>
    <div class="flex gap-2">
      <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-5 py-2 font-medium">Enviar</button>
      <a href="/home" class="text-slate-500 px-3 py-2 text-sm hover:underline">Omitir</a>
    </div>
  </form>
</div>
{% endblock %}
