{% extends "base.html" %}
{% block title %}Registrar asistencia{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-1">Registrar asistencia</h1>
  <p class="text-slate-500 mb-5 text-sm">Escaneá el código QR que muestra el docente, o ingresá el código de 6 dígitos.</p>

  <div class="bg-white rounded-2xl shadow p-5 mb-4">
    <div id="reader" class="rounded-lg overflow-hidden"></div>
    <button id="start" class="mt-3 w-full bg-slate-800 hover:bg-slate-700 text-white rounded-lg py-2 text-sm inline-flex items-center justify-center gap-2"><i data-lucide="camera" class="w-4 h-4"></i> Activar cámara</button>
    <p id="scan-status" class="text-xs text-slate-400 mt-2"></p>
  </div>

  <form method="post" action="/checkin" class="bg-white rounded-2xl shadow p-5">
    <label class="block text-sm font-medium mb-1">Código de 6 dígitos</label>
    <div class="flex gap-2">
      <input id="codigo" name="codigo" inputmode="numeric" pattern="[0-9]*" required class="flex-1 border rounded-lg px-3 py-2 text-lg tracking-widest text-center" placeholder="000000">
      <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-5 py-2 font-medium">Validar</button>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const statusEl = document.getElementById('scan-status');
  let scanner = null;
  document.getElementById('start').addEventListener('click', () => {
    if (!window.Html5Qrcode) { statusEl.textContent = 'No se pudo cargar el escáner. Usá el código manual.'; return; }
    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 220 },
      (text) => {
        statusEl.textContent = 'Código leído: ' + text;
        document.getElementById('codigo').value = text.trim();
        scanner.stop().then(() => document.querySelector('form').submit());
      },
      () => {}
    ).catch(() => { statusEl.textContent = 'No se pudo abrir la cámara. Usá el código manual.'; });
  });
</script>
{% endblock %}
