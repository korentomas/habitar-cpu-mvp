{% extends "base.html" %}
{% block title %}Gestión de FAQ{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Preguntas frecuentes</h1>

<div class="bg-white rounded-2xl shadow p-6 mb-6 max-w-2xl">
  <h2 class="font-semibold mb-3">Agregar pregunta</h2>
  <form method="post" action="/admin/faq" class="space-y-3">
    <input name="pregunta" required placeholder="Pregunta" class="w-full border rounded-lg px-3 py-2">
    <textarea name="respuesta" required rows="2" placeholder="Respuesta" class="w-full border rounded-lg px-3 py-2"></textarea>
    <div class="flex items-center gap-2">
      <input type="number" name="orden" value="0" class="w-24 border rounded-lg px-3 py-2" title="Orden">
      <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-5 py-2 font-medium">Agregar</button>
    </div>
  </form>
</div>

<div class="space-y-2">
  {% for f in items %}
  <div class="bg-white rounded-xl shadow p-4 flex items-start justify-between gap-3">
    <div>
      <p class="font-medium">{{ f.pregunta }}</p>
      <p class="text-slate-600 text-sm mt-1">{{ f.respuesta }}</p>
    </div>
    <form method="post" action="/admin/faq/{{ f.id }}/delete" onsubmit="return confirm('¿Eliminar esta pregunta?')">
      <button class="text-rose-600 text-sm hover:underline">Eliminar</button>
    </form>
  </div>
  {% else %}
  <p class="text-slate-500">No hay preguntas cargadas.</p>
  {% endfor %}
</div>
{% endblock %}
