{% extends "base.html" %}
{% block title %}{{ 'Editar' if a else 'Nueva' }} actividad{% endblock %}
{% block content %}
<a href="/admin" class="text-sm text-indigo-600 hover:underline inline-flex items-center gap-1"><i data-lucide="arrow-left" class="w-4 h-4"></i> Panel</a>
<div class="bg-white rounded-2xl shadow p-8 mt-3 max-w-2xl">
  <h1 class="text-2xl font-bold mb-5">{{ 'Editar actividad' if a else 'Nueva actividad' }}</h1>
  <form method="post" action="{{ ('/admin/actividades/' ~ a.id) if a else '/admin/actividades' }}" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Título</label>
      <input name="titulo" value="{{ a.titulo if a else '' }}" required class="w-full border rounded-lg px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Descripción</label>
      <textarea name="descripcion" rows="3" class="w-full border rounded-lg px-3 py-2">{{ a.descripcion if a else '' }}</textarea>
    </div>
    <div class="grid sm:grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium mb-1">Tipo</label>
        <select name="tipo" class="w-full border rounded-lg px-3 py-2">
          {% for t in tipos %}<option value="{{ t }}" {% if a and a.tipo==t %}selected{% endif %}>{{ t|capitalize }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Docente</label>
        <select name="docente_id" class="w-full border rounded-lg px-3 py-2">
          <option value="">— Sin asignar —</option>
          {% for d in docentes %}<option value="{{ d.id }}" {% if a and a.docente_id==d.id %}selected{% endif %}>{{ d.full_name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="grid sm:grid-cols-2 gap-3">
      <div><label class="block text-sm font-medium mb-1">Inicio</label><input type="datetime-local" name="fecha_inicio" value="{{ a.fecha_inicio|fmt_input if a else '' }}" required class="w-full border rounded-lg px-3 py-2"></div>
      <div><label class="block text-sm font-medium mb-1">Fin</label><input type="datetime-local" name="fecha_fin" value="{{ a.fecha_fin|fmt_input if a else '' }}" required class="w-full border rounded-lg px-3 py-2"></div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Lugar</label>
      <input name="lugar" value="{{ a.lugar if a else '' }}" class="w-full border rounded-lg px-3 py-2">
    </div>
    <div class="grid sm:grid-cols-2 gap-3">
      <div><label class="block text-sm font-medium mb-1">Créditos</label><input type="number" name="creditos" min="1" value="{{ a.creditos if a else 1 }}" required class="w-full border rounded-lg px-3 py-2"></div>
      <div><label class="block text-sm font-medium mb-1">Cupo máximo</label><input type="number" name="cupo_max" min="1" value="{{ a.cupo_max if a else 30 }}" required class="w-full border rounded-lg px-3 py-2"></div>
    </div>
    <div class="flex gap-2 pt-2">
      <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-6 py-2 font-medium">Guardar</button>
      <a href="/admin" class="text-slate-500 px-3 py-2 hover:underline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
