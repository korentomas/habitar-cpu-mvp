{% extends "base.html" %}
{% block title %}Importar legajos{% endblock %}
{% block content %}
<a href="/admin/inscriptos" class="text-sm text-indigo-600 hover:underline">← Inscriptos</a>
<div class="bg-white rounded-2xl shadow p-8 mt-3 max-w-lg">
  <h1 class="text-2xl font-bold mb-1">Padrón de legajos (SIU)</h1>
  <p class="text-slate-500 text-sm mb-4">Actualmente hay <b>{{ total }}</b> legajos habilitados para registrarse.</p>
  <form method="post" action="/admin/legajos/import" enctype="multipart/form-data" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Archivo CSV o XLSX</label>
      <input type="file" name="archivo" accept=".csv,.xlsx" required class="w-full border rounded-lg px-3 py-2">
      <p class="text-xs text-slate-400 mt-1">Columnas esperadas: <code>legajo</code> (obligatoria), <code>nombre</code> (opcional).</p>
    </div>
    <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-5 py-2 font-medium">Importar</button>
  </form>
</div>
{% endblock %}
